<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- LeadKart favicon set — multi-size PNG matching the Blazor canon.
		     Browsers pick the closest size for tab / pinned tab / homescreen. -->
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/images/favicon/favicon_16x16.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/images/favicon/favicon_32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="64x64"
			href="%sveltekit.assets%/images/favicon/favicon_64x64.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="128x128"
			href="%sveltekit.assets%/images/favicon/favicon_128x128.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="256x256"
			href="%sveltekit.assets%/images/favicon/favicon_256x256.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="512x512"
			href="%sveltekit.assets%/images/favicon/favicon_512x512.png"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light" />
		<!-- Mobile browser chrome — navy-violet logo brand. Overridden at
		     runtime if the user picks an alt primary (theme.svelte.ts). -->
		<meta name="theme-color" content="#2D2F7E" />
		<title>LeadKart</title>
		<!--
			Customiser prime — runs SYNCHRONOUSLY before first paint to
			apply the user's saved primary-colour + layout choices, so
			the page renders branded on first paint (no FOUC).

			Industry canon: every modern dashboard (Vercel, Linear,
			GitHub, Stripe Dashboard) ships an inline blocking prime
			script. The cost is ~200 bytes + ~1ms execution; the win is
			no flash-of-unbranded-content.

			Tracks `localStorage['leadkart-primary']`,
			`leadkart-sidebar-size`, and `leadkart-content-width`
			written by lib/stores/theme.svelte.ts. Failure-mode tolerant:
			try/catch swallows errors so a private-mode browser falls
			back to defaults cleanly.

			Also strips any legacy `.dark` class — dark mode was removed
			2026-05-12 and users who toggled it before then would
			otherwise carry a stale class.
		-->
		<script>
			(function () {
				try {
					var root = document.documentElement;
					root.classList.remove('dark');

					var p = localStorage.getItem('leadkart-primary');
					if (
						p &&
						[
							'blue',
							'green',
							'indigo',
							'orange',
							'teal',
							'purple',
							'pink',
							'red',
							'mint',
							'cyan'
						].indexOf(p) >= 0
					) {
						root.setAttribute('data-primary', p);
					}

					var s = localStorage.getItem('leadkart-sidebar-size');
					if (s === 'compact') root.setAttribute('data-sidebar-size', s);

					var w = localStorage.getItem('leadkart-content-width');
					if (w === 'fluid') root.setAttribute('data-content-width', w);
				} catch (e) {
					/* private-mode: fall back to defaults */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
