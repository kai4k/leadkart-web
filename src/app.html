<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- LeadKart favicon set — multi-size PNG matching the Blazor canon.
		     Browsers pick the closest size for tab / pinned tab / homescreen. -->
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/images/favicon/favicon_16x16.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/images/favicon/favicon_32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="64x64"
			href="%sveltekit.assets%/images/favicon/favicon_64x64.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="128x128"
			href="%sveltekit.assets%/images/favicon/favicon_128x128.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="256x256"
			href="%sveltekit.assets%/images/favicon/favicon_256x256.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="512x512"
			href="%sveltekit.assets%/images/favicon/favicon_512x512.png"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#265A8E" />
		<title>LeadKart</title>
		<!--
			Theme prime — runs SYNCHRONOUSLY before first paint to apply
			the .dark class on <html> if the user has dark theme stored
			or has system dark + 'system' preference. Without this,
			users see a flash of light theme on every reload (FOUC).

			Industry canon: every modern dashboard (Vercel, Linear,
			GitHub, Stripe Dashboard) ships an inline blocking script
			for theme priming. The cost is ~200 bytes ungzipped + ~1ms
			execution; the win is no FOUC ever.

			Tracks `localStorage['leadkart-theme']` written by
			lib/stores/theme.svelte.ts. Failure-mode tolerant: try/catch
			swallows errors so a private-mode browser (no localStorage)
			falls back to light cleanly.
		-->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('leadkart-theme') || 'system';
					var dark =
						t === 'dark' ||
						(t === 'system' &&
							window.matchMedia &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {
					/* private-mode: fall back to light */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
