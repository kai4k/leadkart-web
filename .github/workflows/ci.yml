name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

# Cancel in-flight runs on the same branch when a new commit lands.
# Saves runner minutes + GitHub minutes quota. Industry canon (every
# Linear / Vercel / Stripe public CI yaml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Combined static-analysis + unit + build + e2e in ONE job.
  #
  # Why combined: separating build and e2e into two jobs forces a
  # second `npm install` + an artifact upload/download round-trip
  # for the build output. At ~30s × 2 + ~30s × 2 = ~2-3 minutes
  # of duplicated work per PR. For a free-tier private repo
  # (2,000 min/month), that's a meaningful chunk over time.
  #
  # Order is fast-fail: cheap checks (audit, lint, check, test) run
  # before the expensive ones (build, e2e), so a typo-level bug
  # consumes seconds rather than the whole pipeline budget.
  ci:
    name: Build & test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        # `npm install` (not `npm ci`) because our dep tree includes
        # platform-specific WASM bindings (@rolldown/binding-wasm32-wasi,
        # @tailwindcss/oxide-wasm32-wasi) that Vite 8 + Tailwind 4 ship
        # as optional fallbacks for native modules. npm 11's strict
        # `npm ci` rejects the lock when the host platform's variant
        # differs from the lock-author's platform — known issue tracked
        # in npm/cli#5169 + vite/vite#15869. Plain `npm install` with
        # `--prefer-offline` reuses the lock when possible while
        # tolerating cross-platform variance. Lock determinism is still
        # enforced at PR-review time via committed package-lock.json
        # + Dependabot.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Security audit (high+ severity blocks)
        # Cheap (~5s with cached registry); runs early so a vulnerable
        # transitive dep blocks the rest of the pipeline before we
        # spend minutes on lint / build / e2e. Dependabot covers
        # ongoing surveillance of merged deps; this catches NEW
        # vulnerable deps introduced by the PR itself.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Type check (svelte-check + tsc)
        run: npm run check

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage (push-to-main only)
        # Coverage on PR is rarely actioned; the merged-into-main
        # report is the one teams reference for trend lines. Skipping
        # PR uploads saves ~20s per PR + storage.
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Bundle-size check
        run: npx size-limit

      # Cache Playwright's chromium across runs — saves ~30s per run
      # when the @playwright/test version is unchanged. Cache key
      # includes the package version so a bump invalidates cleanly.
      - name: Get Playwright version
        id: pw-version
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright chromium
        uses: actions/cache@v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests (chromium)
        # Chromium-only matrix per chore/ci-cost-reduction:
        # Firefox + WebKit re-add when a browser-specific bug
        # surfaces or pre-launch coverage demands it. ~70% of
        # browser usage is Chromium-based (Chrome + Edge); the
        # JS engine differences rarely manifest in our SPA's
        # form/CRUD surfaces.
        run: npx playwright test --project=chromium --reporter=html
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
